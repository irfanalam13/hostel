# =============================================================================
# TLS hardening — included by the 443 server block in app.conf.template.
# Mounted read-only at /etc/nginx/snippets/ssl.conf. No env substitution runs
# on this file, so nginx runtime tokens are safe here.
#
# Target: Mozilla "Intermediate" profile (A+ on SSL Labs / testssl.sh) while
# staying compatible with every browser from the last several years.
# =============================================================================

# Only modern protocols. TLS 1.0/1.1 are removed (POODLE/BEAST, deprecated by
# all major browsers). TLS 1.3 is the default; 1.2 is the compatibility floor.
ssl_protocols TLSv1.2 TLSv1.3;

# Cipher suite for TLS 1.2 — AEAD + ECDHE only, i.e. authenticated encryption
# with Perfect Forward Secrecy (each session key is ephemeral, so a future key
# compromise cannot decrypt past traffic). TLS 1.3's suites are fixed by the
# protocol and are always forward-secret, so they need no listing here.
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

# Let the (modern) client choose from our list — better with TLS 1.3 and avoids
# forcing AES on devices where ChaCha20 is faster. "on" only helps legacy clients
# we no longer support.
ssl_prefer_server_ciphers off;

# Curves for ECDHE key exchange, X25519 first (fast + constant-time).
ssl_ecdh_curve X25519:prime256v1:secp384r1;

# Session resumption cuts the handshake cost on repeat visits. Tickets are OFF:
# stateless session tickets weaken Perfect Forward Secrecy unless the ticket key
# is rotated frequently, so we keep only the server-side shared cache.
ssl_session_cache shared:SSL:10m;   # ~40k sessions
ssl_session_timeout 1d;
ssl_session_tickets off;

# OCSP stapling: nginx fetches and caches the CA's revocation status and serves
# it inside the handshake, so the client never makes its own (privacy-leaking,
# latency-adding) OCSP call. Requires the issuer chain (present in fullchain.pem)
# and a DNS resolver to reach the OCSP responder. Harmless no-op for certs that
# carry no OCSP URL (e.g. a private CA) — nginx just logs and serves unstapled.
ssl_stapling on;
ssl_stapling_verify on;
ssl_trusted_certificate /etc/nginx/certs/fullchain.pem;
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;
