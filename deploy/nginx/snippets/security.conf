# =============================================================================
# Server-level edge hardening — include inside each public server{} block.
# Pairs with the zones/maps in templates/00-security.conf.template.
# =============================================================================

# --- Slowloris / slow-read protection -----------------------------------------
# A client must deliver headers within 10s and body chunks within 15s, and
# accept our response bytes within 15s — otherwise the connection is reaped
# instead of pinning a worker.
client_header_timeout 10s;
client_body_timeout   15s;
send_timeout          15s;

# Keep-alive tuned for legitimate browsers while bounding per-connection reuse.
keepalive_timeout  65s;
keepalive_requests 1000;

# Don't advertise the nginx version to scanners.
server_tokens off;

# Hard cap on buffered request headers (header-abuse containment).
large_client_header_buffers 4 16k;

# --- Request-line enforcement (maps from 00-security.conf) --------------------
if ($edge_block_agent)  { return 403; }
if ($edge_block_method) { return 405; }
