# =============================================================================
# Edge-owned security headers — included by the 443 server block.
#
# DELIBERATELY MINIMAL. The application layers already emit a strict, per-request
# content-security header set (CSP w/ nonce, Trusted Types, X-Frame-Options,
# Referrer-Policy, Permissions-Policy, COOP/COEP/CORP, X-Content-Type-Options) —
# Next.js in frontend/src/middleware.ts and Django in
# apps.common.middleware.SecurityHeadersMiddleware. Re-stamping those at the
# proxy would produce DUPLICATE headers; for CSP in particular two policies are
# intersected by the browser and can silently break the app.
#
# So nginx owns exactly one thing the apps don't reliably set: the TRANSPORT
# header, HSTS. It applies to the connection (not the document), and the Next.js
# *document* responses do not set it (only static assets do, via next.config.ts).
# Terminating TLS here is the right place to guarantee it on every response.
# =============================================================================

# Force HTTPS for 2 years, on all subdomains, and allow preload-list inclusion.
# Matches the value Next.js stamps on assets (next.config.ts). `always` so it is
# sent even on error/redirect responses.
#
# NOTE: set SECURE_HSTS_SECONDS=0 in deploy/.env so Django does NOT also emit
# HSTS on /api and /admin responses (avoids a duplicate header). The edge owns
# HSTS now. See docs/HTTPS.md → "Who owns which header".
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
