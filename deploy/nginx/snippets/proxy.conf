# =============================================================================
# Common upstream proxy headers — included inside each backend/frontend
# location. Keeps the forwarded-identity + keep-alive setup in one place.
# =============================================================================
proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
# The original scheme — Django reads this via SECURE_PROXY_SSL_HEADER to know the
# request arrived over HTTPS even though the proxy->app hop is plain HTTP.
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;
# Empty Connection enables upstream keep-alive (paired with `keepalive` in the
# upstream block) — fewer TCP/TLS setups to the app servers.
proxy_set_header Connection        "";
proxy_connect_timeout 5s;
proxy_send_timeout    60s;
proxy_read_timeout    60s;
