# =============================================================================
# LOCAL-DEVELOPMENT TLS reverse proxy — serves the whole app on
# https://localhost so the browser, the SPA and the API all share ONE secure
# origin (exactly like production). This is the dev mirror of
# deploy/nginx/templates/app.conf.template.
#
# Why a proxy in dev at all?
#   * Service Workers, Web Push, Trusted Types, COOP/COEP and "Secure" cookies
#     only behave like production over real HTTPS. `localhost` is a secure
#     context, but a single TLS origin also removes cross-origin/CORS/CSRF
#     surprises that bite when you finally ship.
#   * Certs are issued by mkcert (a locally-trusted CA) so there are NO browser
#     warnings — see scripts/setup-dev-https.{ps1,sh}.
#
# This file is mounted read-only at /etc/nginx/conf.d/default.conf, so it is
# included inside the stock image's `http {}` block. It is NOT a `templates/`
# file, so no envsubst runs and `$host`/`$scheme` are passed through verbatim.
# =============================================================================

upstream dev_backend  { server web:8000;      keepalive 16; }
upstream dev_frontend { server frontend:3000; keepalive 16; }

# Plain HTTP -> permanent redirect to HTTPS (no ACME in dev).
server {
    listen 80;
    server_name localhost 127.0.0.1;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name localhost 127.0.0.1;

    # mkcert-issued leaf + key (generated by scripts/setup-dev-https.*).
    ssl_certificate     /etc/nginx/certs/localhost.pem;
    ssl_certificate_key /etc/nginx/certs/localhost-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Hand the real scheme to Django (SECURE_PROXY_SSL_HEADER) and preserve the
    # client identity for logging / throttling.
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header Host              $host;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    client_max_body_size 25m;

    # Next.js dev server (next dev) pushes Fast-Refresh updates over a WebSocket.
    # Harmless against the standalone prod image; required if you swap `frontend`
    # for `next dev`. This is also the template for a real wss:// upgrade block
    # (see docs/HTTPS.md → "WebSockets / Django Channels (future)").
    location /_next/webpack-hmr {
        proxy_pass http://dev_frontend;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Backend: API, admin, health, static + media (served by WhiteNoise).
    location ~ ^/(api|admin|health|static|media)/ {
        proxy_pass http://dev_backend;
    }

    # Everything else: the Next.js frontend.
    location / {
        proxy_pass http://dev_frontend;
    }
}
