# =============================================================================
# LOCAL-DEVELOPMENT single-origin gateway (plain HTTP).
#
# Serves the ENTIRE multi-zone app on ONE browser origin — http://localhost
# (and http://hostel.local if you add it to your hosts file) — exactly like
# production, where a single edge fronts the client zone, the admin zone and
# Django. This removes the cross-origin dev hacks (the client dev server
# reverse-proxying the admin dev server) that broke Turbopack hydration.
#
# WHY A GATEWAY (not client-proxies-admin): one Next.js dev server proxying
# another mangles the inner app's Turbopack runtime/HMR, so admin pages render
# but never hydrate (forms fall back to native GET submits, "infinite refresh").
# Here every request goes DIRECTLY to the correct dev server, so both zones
# hydrate on their own — same as production.
#
# Routing (mirrors production/app.conf.template):
#   /                                  -> client zone (marketing)   frontend:3000
#   /about /privacy /terms /security   -> client zone
#   /login /signup /dashboard /...     -> admin zone (everything else)  admin:3000
#   /_next/                            -> client zone (its chunks, HMR, image opt.)
#   /admin-static/                     -> admin zone (its chunks + HMR; assetPrefix)
#   /api/ /admin/ /static/ /media/ /health/  -> Django              web:8000
#
# The two Next dev servers share the /_next namespace, which cannot both be
# proxied from a single origin. Production already solves this by giving the
# admin zone assetPrefix "/admin-static"; we enable the same prefix in dev (see
# apps/admin/next.config.ts) so /_next -> client and /admin-static -> admin
# never collide. The image optimizer (/_next/image) is NOT assetPrefixed by
# Next, so it stays under /_next and is served by the client optimizer for both
# zones — identical to production.
#
# Mounted read-only at /etc/nginx/conf.d/default.conf (inside the stock image's
# http{} block). No envsubst runs on it, so $host/$scheme pass through verbatim.
# =============================================================================

# WebSocket upgrade helper. For a real WS handshake (Upgrade: websocket) send
# "Connection: upgrade"; for every ordinary request send an EMPTY Connection so
# upstream keep-alive stays enabled (NOT "close", which would kill keep-alive).
# This is what lets HMR websockets AND pooled HTTP both work on one server.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      "";
}

# NO static `upstream {}` blocks here. Nginx resolves a hostname in an upstream
# block ONCE at config load and caches the IP forever. In Docker Compose, every
# `docker compose up --build` / recreate gives the app containers (web, admin,
# frontend, ml_hostel) NEW IPs, but nginx keeps dialing the old ones →
# `connect() failed (111: Connection refused)` → 502 on /api and the pages,
# until nginx is manually restarted. Instead we resolve upstreams at REQUEST time
# via Docker's embedded DNS (127.0.0.11) + a variable in proxy_pass, so a
# recreated container is picked up within `valid=` and no nginx restart is needed.
# (Upstream keepalive is dropped — a per-request connection is fine in dev.)

server {
    listen 80;
    listen [::]:80;
    server_name localhost hostel.local 127.0.0.1;

    # Docker's embedded DNS. Re-resolving here (not in a static upstream block)
    # is what lets a rebuilt container's new IP be picked up without a restart.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Dev uploads (imports, media, backups). Generous ceiling.
    client_max_body_size 50m;

    # --- Forwarded identity ---------------------------------------------------
    # Django reads X-Forwarded-Proto (SECURE_PROXY_SSL_HEADER in prod) and the
    # Host header (tenant/workspace middleware, ALLOWED_HOSTS, CSRF origin). The
    # Next security proxy reads X-Forwarded-Proto to decide upgrade-insecure.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;

    # --- WebSockets everywhere (client + admin HMR, any app WS) ---------------
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # --- Streaming: don't buffer SSR / HMR / SSE / exports --------------------
    # App-Router HTML streams in chunks; buffering it would stall first paint and
    # can look like "infinite loading". Off in dev is the safe, prod-like choice.
    proxy_buffering off;
    proxy_request_buffering off;

    # --- Timeouts: keep HMR sockets and slow first compiles alive -------------
    proxy_connect_timeout 10s;
    proxy_send_timeout    3600s;
    proxy_read_timeout    3600s;

    # NO security headers are stamped here. Each Next.js zone emits its own strict
    # per-request CSP (nonce), Trusted-Types, COOP/COEP/CORP, Permissions-Policy
    # (frontend/apps/*/src/proxy.ts), and Django emits its own. Re-stamping at the
    # edge would DUPLICATE them — and two CSP headers are intersected by the
    # browser, silently breaking every script. HSTS is omitted: dev is plain HTTP
    # (use deploy/dev/docker-compose.https.yml when you need to exercise TLS).

    # Gateway liveness (compose healthcheck hits this; never proxied upstream).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "gateway ok\n";
    }

    # --- Django: API, admin, health, static + media (WhiteNoise) --------------
    # NOTE the trailing slashes: "/admin/" is the DJANGO admin site, while the
    # bare "/admin" route (the admin zone's dashboard-login page) has no trailing
    # slash and falls through to `location /` -> admin zone. This split matches
    # production (app.conf.template `location ~ ^/(api|admin)/`).
    # A variable in proxy_pass forces per-request DNS resolution via the resolver
    # above (a bare `proxy_pass http://web:8000;` would be resolved once at load
    # and cached, reintroducing the stale-IP 502). No URI part on proxy_pass ⇒
    # the full original request URI is forwarded unchanged.
    location /api/    { set $django http://web:8000; proxy_pass $django; }
    location /admin/  { set $django http://web:8000; proxy_pass $django; }
    location /static/ { set $django http://web:8000; proxy_pass $django; }
    location /media/  { set $django http://web:8000; proxy_pass $django; }
    location /health/ { set $django http://web:8000; proxy_pass $django; }

    # --- AI service (SSE streaming chat) --------------------------------------
    # Same-origin path so the browser opens the token stream with no CORS.
    # proxy_buffering is already off globally, which SSE requires to flush tokens.
    # With a variable proxy_pass we cannot append a URI to strip the prefix, so
    # `rewrite` does it: /ai/v1/... -> /v1/... (equivalent to the old trailing
    # slash on `proxy_pass http://ml_service/`).
    location /ai/ {
        set $ml http://ml_hostel:9000;
        rewrite ^/ai/(.*)$ /$1 break;
        proxy_pass $ml;
    }

    # --- Shared /_next namespace -> client zone -------------------------------
    # Client build chunks, the client HMR socket (/_next/webpack-hmr) AND the
    # image optimizer (/_next/image — not assetPrefixed, so served here for both
    # zones, as in production). ^~ short-circuits any later regex matching.
    location ^~ /_next/ {
        set $client http://frontend:3000;
        proxy_pass $client;
    }

    # --- Admin zone assets + HMR (assetPrefix = /admin-static) ----------------
    # Admin's build chunks and its HMR socket both carry this prefix (the dev
    # server derives the HMR path from assetPrefix -> /admin-static/_next/
    # webpack-hmr). Routing the whole prefix here keeps the two dev servers'
    # /_next namespaces from colliding.
    location ^~ /admin-static/ {
        set $admin http://admin:3000;
        proxy_pass $admin;
    }

    # --- Marketing (client zone) ----------------------------------------------
    location = /            { set $client http://frontend:3000; proxy_pass $client; }
    location = /favicon.ico { set $client http://frontend:3000; proxy_pass $client; }
    location = /robots.txt  { set $client http://frontend:3000; proxy_pass $client; }
    location = /sitemap.xml { set $client http://frontend:3000; proxy_pass $client; }
    location /about    { set $client http://frontend:3000; proxy_pass $client; }
    location /privacy  { set $client http://frontend:3000; proxy_pass $client; }
    location /terms    { set $client http://frontend:3000; proxy_pass $client; }
    location /security { set $client http://frontend:3000; proxy_pass $client; }

    # --- Everything else -> admin zone ----------------------------------------
    # Auth (/login /signup /verify-otp /forgot-* /reset-* /select-hostel), the
    # whole authenticated workspace (/dashboard /residents /billing /tenants ...),
    # role portals (/admin /staff /student /parent) and PWA assets the admin zone
    # owns (/sw.js /manifest.webmanifest /icons/ /offline /screenshots/).
    location / {
        set $admin http://admin:3000;
        proxy_pass $admin;
    }
}
