# SLO recording rules + multi-window error-budget burn-rate alerts (Phase 4, §4).
#
# Availability SLO target = 99.5%  → error budget = 0.5% (0.005).
# SLI = 5xx / total responses (same series the HighApiErrorRate alert uses).
#
# Burn-rate alerting (Google SRE): a "burn rate" of 1 spends the budget exactly
# over the SLO window; higher = faster. We page on FAST burn (budget gone in
# ~2 days) confirmed on two windows, and ticket on SLOW burn. Two-window pairs
# suppress false alarms from short spikes and resolve quickly once healthy.
groups:
  - name: slo_sli_recording
    interval: 30s
    rules:
      - record: job:http_errors:ratio_rate5m
        expr: |
          sum(rate(django_http_responses_total_by_status_total{status=~"5.."}[5m]))
          / clamp_min(sum(rate(django_http_responses_total_by_status_total[5m])), 1)
      - record: job:http_errors:ratio_rate30m
        expr: |
          sum(rate(django_http_responses_total_by_status_total{status=~"5.."}[30m]))
          / clamp_min(sum(rate(django_http_responses_total_by_status_total[30m])), 1)
      - record: job:http_errors:ratio_rate1h
        expr: |
          sum(rate(django_http_responses_total_by_status_total{status=~"5.."}[1h]))
          / clamp_min(sum(rate(django_http_responses_total_by_status_total[1h])), 1)
      - record: job:http_errors:ratio_rate6h
        expr: |
          sum(rate(django_http_responses_total_by_status_total{status=~"5.."}[6h]))
          / clamp_min(sum(rate(django_http_responses_total_by_status_total[6h])), 1)

  - name: slo_burn_rate_alerts
    rules:
      # Fast burn: 14.4x budget on 5m AND 1h → ~2% of monthly budget in 1h.
      - alert: ErrorBudgetBurnFast
        expr: |
          job:http_errors:ratio_rate5m > (14.4 * 0.005)
          and job:http_errors:ratio_rate1h > (14.4 * 0.005)
        for: 2m
        labels: {severity: critical, slo: availability}
        annotations:
          summary: "Fast error-budget burn (availability SLO 99.5%)"
          description: "5xx burn rate >14.4x on 5m+1h. At this pace the monthly error budget is exhausted in ~2 days — page on-call."
      # Slow burn: 6x budget on 30m AND 6h → sustained degradation.
      - alert: ErrorBudgetBurnSlow
        expr: |
          job:http_errors:ratio_rate30m > (6 * 0.005)
          and job:http_errors:ratio_rate6h > (6 * 0.005)
        for: 15m
        labels: {severity: high, slo: availability}
        annotations:
          summary: "Slow error-budget burn (availability SLO 99.5%)"
          description: "5xx burn rate >6x on 30m+6h. Sustained budget erosion — open a ticket and investigate."
