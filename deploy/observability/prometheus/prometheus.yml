# Prometheus scrape configuration for the Hostel SaaS.
# Reload without restart:  curl -X POST http://prometheus:9090/-/reload
# NOTE: Prometheus does NOT expand ${ENV} in this file (only docker-compose
# interpolates its own command/env). Edit literals here directly.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: "production"

rule_files:
  - /etc/prometheus/alerts.yml
  - /etc/prometheus/slo-rules.yml   # SLI recording rules + error-budget burn-rate alerts
  - /etc/prometheus/ai-alerts.yml   # AI error-rate / latency / cost guardrails

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # Django backend — includes django-prometheus HTTP/DB metrics AND the custom
  # security series (hostel_security_events_total, hostel_rate_limit_*,
  # hostel_auth_events_total) from apps.security.metrics.
  - job_name: "hostel-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["web:8000"]
        labels: {service: "backend"}

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels: {service: "redis"}

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels: {service: "postgres"}

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels: {service: "host"}

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels: {service: "containers"}

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
