# =============================================================================
# Observability stack — Prometheus + Grafana + Loki + Promtail + Alertmanager
# + exporters (redis / postgres / node / cAdvisor).
#
# Runs ALONGSIDE the app stack, sharing its Docker network so scrape targets
# resolve by service name (web, redis, postgres). Enable the app's metrics
# first:  PROMETHEUS_ENABLED=True  (settings.py exposes /metrics).
#
#   docker compose \
#     -f deploy/docker-compose.prod.yml \
#     -f deploy/observability/docker-compose.observability.yml \
#     --env-file deploy/.env up -d
#
# Everything is internal by default; publish Grafana behind the auth proxy /
# VPN only. Nothing here is required for the app to run — it is pure
# observability and can be added/removed without touching the application.
# =============================================================================
services:
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=${PROM_RETENTION:-15d}"
      - "--web.enable-lifecycle"          # POST /-/reload for hot config reload
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./prometheus/slo-rules.yml:/etc/prometheus/slo-rules.yml:ro
      - ./prometheus/ai-alerts.yml:/etc/prometheus/ai-alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - alertmanager
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    command: ["--config.file=/etc/alertmanager/alertmanager.yml"]
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?set GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3009}:3000"
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:3.1.1
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.1.1
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      # Ship container stdout/stderr (JSON logs) to Loki.
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  # ---- Exporters ------------------------------------------------------------
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: ${REDIS_ADDR:-redis://redis:6379}
    depends_on:
      - prometheus

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    environment:
      # Uses the app DB creds; a read-only monitoring role is recommended.
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-hostel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hostel}?sslmode=disable"

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - /:/host:ro,rslave

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg

volumes:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  loki_data:

# Attach to the app stack's network so scrape targets resolve by name.
networks:
  default:
    name: ${APP_NETWORK:-hostel_default}
    external: true
