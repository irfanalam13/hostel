# =============================================================================
# Production / staging compose — runs PRE-BUILT images pulled from the registry
# (GHCR) instead of building on the host, with Nginx terminating TLS in front.
#
# Driven entirely by `deploy/.env` on the VPS (see .env.prod.example). The CI
# deploy job sets BACKEND_IMAGE / FRONTEND_IMAGE to the exact pushed tags, then
# runs deploy.sh which pulls + migrates + health-gates the rollout.
#
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env up -d
# =============================================================================
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hostel}
      POSTGRES_USER: ${POSTGRES_USER:-hostel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hostel} -d ${POSTGRES_DB:-hostel}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  web:
    image: ${BACKEND_IMAGE:?set BACKEND_IMAGE}
    restart: unless-stopped
    env_file: .env
    # Resource caps so one runaway service can't starve the host (tunable).
    mem_limit: ${WEB_MEM_LIMIT:-768m}
    cpus: ${WEB_CPUS:-1.5}
    # Migrations are applied explicitly by deploy.sh BEFORE the rollout, never
    # implicitly on boot, so ordering is deterministic across replicas.
    environment:
      RUN_MIGRATIONS: "0"
      PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED:-True}
    volumes:
      - media_data:/app/media
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  celery_worker:
    image: ${BACKEND_IMAGE:?set BACKEND_IMAGE}
    restart: unless-stopped
    env_file: .env
    mem_limit: ${WORKER_MEM_LIMIT:-512m}
    cpus: ${WORKER_CPUS:-1.0}
    # Sidecars never migrate — deploy.sh owns schema changes (see web).
    environment:
      RUN_MIGRATIONS: "0"
    command: ["celery", "-A", "config", "worker", "--loglevel=info"]
    volumes:
      - media_data:/app/media
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery_beat:
    image: ${BACKEND_IMAGE:?set BACKEND_IMAGE}
    restart: unless-stopped
    env_file: .env
    # Sidecars never migrate — deploy.sh owns schema changes (see web).
    environment:
      RUN_MIGRATIONS: "0"
    command: ["celery", "-A", "config", "beat", "--loglevel=info", "--schedule", "/tmp/celerybeat-schedule", "--pidfile="]
    depends_on:
      redis: { condition: service_healthy }
    healthcheck:
      disable: true

  # CLIENT zone (marketing). Owns "/" and fallback-rewrites every other path
  # to the admin zone, so nginx keeps a single Next.js upstream.
  frontend:
    image: ${CLIENT_IMAGE:?set CLIENT_IMAGE}
    restart: unless-stopped
    mem_limit: ${FRONTEND_MEM_LIMIT:-512m}
    cpus: ${FRONTEND_CPUS:-1.0}
    environment:
      NODE_ENV: production
      ADMIN_ZONE_URL: http://admin:3000
      # Workspace-subdomain + custom-domain routing (Prompts 01/05): read at
      # runtime by the edge proxy (x-workspace / x-tenant-host stamping).
      NEXT_PUBLIC_TENANT_BASE_DOMAIN: ${DOMAIN:?set DOMAIN}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?set NEXT_PUBLIC_API_BASE_URL}
      # SSR fetches (public hostel websites) use the service-internal URL.
      API_INTERNAL_URL: http://web:8000/api
    depends_on:
      admin: { condition: service_started }
      web: { condition: service_started }

  # ADMIN zone (authenticated workspace + PWA). Internal only — reached through
  # the client zone's rewrites.
  admin:
    image: ${ADMIN_IMAGE:?set ADMIN_IMAGE}
    restart: unless-stopped
    mem_limit: ${ADMIN_MEM_LIMIT:-512m}
    cpus: ${ADMIN_CPUS:-1.0}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_TENANT_BASE_DOMAIN: ${DOMAIN:?set DOMAIN}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?set NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      web: { condition: service_started }

  # Optional S3-compatible object storage for media (STORAGE_BACKEND=s3).
  # Enable with:  docker compose --profile storage ...  Or use AWS S3 / R2 and
  # skip this service entirely (settings read S3_ENDPOINT_URL).
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    profiles: ["storage"]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-hostel-media}
      # Interpolated even when the profile is off, so it defaults; MUST be
      # overridden in deploy/.env before enabling the storage profile.
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-change-me-minio-secret}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN}
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      # Shared with the certbot service for the ACME http-01 webroot challenge.
      - certbot_www:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      web: { condition: service_healthy }
      frontend: { condition: service_started }

volumes:
  postgres_data:
  redis_data:
  media_data:
  minio_data:
  # ACME http-01 challenge webroot, written by certbot, read by nginx.
  certbot_www:
