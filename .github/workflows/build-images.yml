name: Build & push images

# Reusable workflow: builds the backend + frontend zone images (client + admin)
# and pushes them to GHCR under the repository owner. Called by the
# staging/production deploy workflows. Outputs the fully-qualified image refs
# so callers pass them straight to the deploy script.
on:
  workflow_call:
    inputs:
      tag:
        description: Primary image tag (e.g. staging-<sha>, v1.2.3).
        required: true
        type: string
      api_base_url:
        description: NEXT_PUBLIC_API_BASE_URL baked into both frontend bundles.
        required: true
        type: string
      tenant_base_domain:
        description: >-
          NEXT_PUBLIC_TENANT_BASE_DOMAIN baked into both frontend bundles —
          the wildcard workspace domain (e.g. myhostel.com). Drives
          subdomain/custom-domain detection in the browser bundle.
        required: true
        type: string
    outputs:
      backend_image:
        description: Fully-qualified backend image ref.
        value: ${{ jobs.build.outputs.backend_image }}
      client_image:
        description: Fully-qualified client (marketing zone) image ref.
        value: ${{ jobs.build.outputs.client_image }}
      admin_image:
        description: Fully-qualified admin zone image ref.
        value: ${{ jobs.build.outputs.admin_image }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & push
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.refs.outputs.backend_image }}
      client_image: ${{ steps.refs.outputs.client_image }}
      admin_image: ${{ steps.refs.outputs.admin_image }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image refs (registry requires lowercase owner)
        id: refs
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          prefix="ghcr.io/${owner}"
          echo "prefix=${prefix}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${prefix}/hostel-backend:${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          echo "client_image=${prefix}/hostel-client:${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          echo "admin_image=${prefix}/hostel-admin:${{ inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.refs.outputs.prefix }}/hostel-backend:${{ inputs.tag }}
            ${{ steps.refs.outputs.prefix }}/hostel-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push client (marketing zone)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/apps/client/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ inputs.api_base_url }}
            NEXT_PUBLIC_TENANT_BASE_DOMAIN=${{ inputs.tenant_base_domain }}
          tags: |
            ${{ steps.refs.outputs.prefix }}/hostel-client:${{ inputs.tag }}
            ${{ steps.refs.outputs.prefix }}/hostel-client:${{ github.sha }}
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client

      - name: Build & push admin zone
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/apps/admin/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ inputs.api_base_url }}
            NEXT_PUBLIC_TENANT_BASE_DOMAIN=${{ inputs.tenant_base_domain }}
          tags: |
            ${{ steps.refs.outputs.prefix }}/hostel-admin:${{ inputs.tag }}
            ${{ steps.refs.outputs.prefix }}/hostel-admin:${{ github.sha }}
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin
