name: Build & push images

# Reusable workflow: builds the backend + frontend images and pushes them to
# GHCR under the repository owner. Called by the staging/production deploy
# workflows. Outputs the fully-qualified image refs so callers pass them
# straight to the deploy script.
on:
  workflow_call:
    inputs:
      tag:
        description: Primary image tag (e.g. staging-<sha>, v1.2.3).
        required: true
        type: string
      api_base_url:
        description: NEXT_PUBLIC_API_BASE_URL baked into the frontend bundle.
        required: true
        type: string
    outputs:
      backend_image:
        description: Fully-qualified backend image ref.
        value: ${{ jobs.build.outputs.backend_image }}
      frontend_image:
        description: Fully-qualified frontend image ref.
        value: ${{ jobs.build.outputs.frontend_image }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & push
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.refs.outputs.backend_image }}
      frontend_image: ${{ steps.refs.outputs.frontend_image }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image refs (registry requires lowercase owner)
        id: refs
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          prefix="ghcr.io/${owner}"
          echo "prefix=${prefix}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${prefix}/hostel-backend:${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${prefix}/hostel-frontend:${{ inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.refs.outputs.prefix }}/hostel-backend:${{ inputs.tag }}
            ${{ steps.refs.outputs.prefix }}/hostel-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ inputs.api_base_url }}
          tags: |
            ${{ steps.refs.outputs.prefix }}/hostel-frontend:${{ inputs.tag }}
            ${{ steps.refs.outputs.prefix }}/hostel-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
