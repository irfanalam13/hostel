name: Infra (Terraform)

# Phase 2, §7. PRs that touch infra/** get a fmt + validate gate (no cloud
# credentials needed). Plan/apply are manual (workflow_dispatch): apply is gated
# behind the `production` GitHub Environment's required reviewers — the same
# Continuous Delivery promotion gate the app deploys use (docs/CD_STRATEGY.md).
on:
  pull_request:
    paths: ["infra/**", ".github/workflows/infra.yml"]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment.
        type: choice
        options: [staging, production]
        default: staging
      apply:
        description: Apply after plan? (production apply still needs approval)
        type: boolean
        default: false

concurrency:
  group: infra-${{ github.event.inputs.environment || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    working-directory: infra/terraform

jobs:
  # PR gate — syntax + formatting only, so it needs no secrets and never flakes.
  validate:
    name: fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Format check
        run: terraform fmt -check -recursive
      - name: Init (no backend)
        run: terraform init -backend=false
      - name: Validate
        run: terraform validate

  # Manual plan/apply against a real environment.
  plan-apply:
    name: ${{ inputs.apply && 'apply' || 'plan' }} (${{ inputs.environment }})
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}   # required reviewers enforce the gate
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_AWS_SECRET_ACCESS_KEY }}
      TF_VAR_django_secret_key: ${{ secrets.DJANGO_SECRET_KEY }}
      TF_VAR_ml_shared_secret: ${{ secrets.ML_SHARED_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Init
        run: terraform init -backend-config=environments/backend-${{ inputs.environment }}.hcl
      - name: Select workspace
        run: terraform workspace select "${{ inputs.environment }}" || terraform workspace new "${{ inputs.environment }}"
      - name: Plan
        run: terraform plan -input=false -var-file=environments/${{ inputs.environment }}.tfvars -out=plan.out
      - name: Apply
        if: ${{ inputs.apply }}
        run: terraform apply -input=false plan.out
