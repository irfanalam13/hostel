name: CI

# Fast feedback gate for every push and PR: lint, unit/integration tests +
# migration checks, and a Docker build of both services. A PR cannot merge green
# unless every blocking job passes — no manual review is needed to catch broken
# code. Heavier gates live in sibling workflows:
#   - production-validation.yml  full stack boot + deploy checks (Prompts 02/05)
#   - security.yml               SAST / deps / containers / SBOM   (Prompt 04)
#   - e2e.yml                    browser E2E + perf + DAST          (Phase 7)
on:
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"
  pull_request:

# Cancel superseded runs on the same ref so a force-push doesn't pile up runners.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default. Jobs that need more (e.g. publishing a check run)
# opt in explicitly at the job level.
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"

jobs:
  # ===========================================================================
  # 1. LINT — blocking. No `|| true`: a lint failure blocks the merge.
  # ===========================================================================
  lint-backend:
    name: Lint (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-backend
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          # Lint needs only ruff, not the full app/test stack.
          install: "false"
      - name: Install ruff
        run: pip install ruff
      # Rule set + line length come from backend/pyproject.toml [tool.ruff].
      - name: Ruff (lint)
        working-directory: backend
        run: ruff check --output-format=github .
      - name: Ruff (format check)
        working-directory: backend
        # Advisory until the one-time repo-wide `ruff format` lands (~223 files);
        # surfaced here so the drift stays visible without blocking unrelated PRs.
        continue-on-error: true
        run: ruff format --check .

  lint-frontend:
    name: Lint (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-frontend
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: ESLint
        working-directory: frontend
        run: npm run lint
      - name: TypeScript type-check
        working-directory: frontend
        run: npx tsc --noEmit

  # ===========================================================================
  # 2. TEST (backend) + migration validation. JUnit + coverage reports.
  # ===========================================================================
  test-backend:
    name: Test + migrations (backend)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write        # dorny/test-reporter publishes a check run
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hostel
          POSTGRES_USER: hostel
          POSTGRES_PASSWORD: hostel
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U hostel" --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DEBUG: "True"
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      DATABASE_URL: postgres://hostel:hostel@localhost:5432/hostel
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-backend
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          install-dev: "true"
      # --- Migration validation (Prompt 04 of the roadmap) -------------------
      - name: Check for missing migrations
        working-directory: backend
        run: python manage.py makemigrations --check --dry-run
      - name: Validate migration plan
        working-directory: backend
        run: python manage.py migrate --plan
      # --- Tests + coverage gate (>=80%, enforced by pytest.ini) -------------
      # pytest.ini pins config.settings_test and --cov-fail-under=80 over the
      # canonical Track A apps (.coveragerc), so an auth/RBAC/billing regression
      # blocks the merge. JUnit + Cobertura XML are emitted for reporting.
      - name: Run tests (coverage gate + JUnit)
        working-directory: backend
        run: >-
          pytest
          --junitxml=test-results/junit.xml
          --cov-report=xml
          --cov-report=term-missing
      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend tests
          path: backend/test-results/junit.xml
          reporter: java-junit
          fail-on-error: false
      - name: Coverage summary
        if: always()
        run: python .github/scripts/coverage_summary.py backend/coverage.xml "Backend coverage"
      - name: Upload test + coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend/test-results/junit.xml
            backend/coverage.xml
            backend/htmlcov
          retention-days: 14

  # ===========================================================================
  # 3. TEST (frontend) — vitest with JUnit output.
  # ===========================================================================
  test-frontend:
    name: Test (frontend)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-frontend
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run tests (vitest + JUnit)
        working-directory: frontend
        # vitest exits 0 when there are no test files, so this stays green until
        # suites are added while still failing on a real test regression.
        run: npm run test -- --reporter=default --reporter=junit --outputFile=test-results/junit.xml
      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Frontend tests
          path: frontend/test-results/junit.xml
          reporter: java-junit
          fail-on-error: false
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: frontend/test-results/junit.xml
          retention-days: 14

  # ===========================================================================
  # 4. BUILD — Docker images for both services. Matrix = parallel, fail-fast off
  # so a backend failure still reports the frontend result.
  # ===========================================================================
  build:
    name: Build ${{ matrix.service }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            build-args: ""
          - service: frontend
            context: ./frontend
            build-args: |
              NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          tags: hostel-${{ matrix.service }}:ci
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
      - name: Build summary
        run: |
          SIZE=$(docker image inspect hostel-${{ matrix.service }}:ci --format '{{.Size}}' \
            | awk '{printf "%.1f MB", $1/1024/1024}')
          {
            echo "### 🐳 ${{ matrix.service }} image built";
            echo "";
            echo "| Image | Size |";
            echo "| --- | --- |";
            echo "| \`hostel-${{ matrix.service }}:ci\` | ${SIZE} |";
          } >> "$GITHUB_STEP_SUMMARY"
