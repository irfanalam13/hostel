name: CI

# Runs on every push and pull request. A PR cannot be merged green unless the
# blocking jobs (test, build, migrations, security) all pass — no manual review
# is required to discover broken code.
on:
  push:
    branches: [main, master, develop]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"

jobs:
  # ===========================================================================
  # 1. LINT
  # ===========================================================================
  lint-backend:
    name: Lint (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install linters
        run: pip install ruff flake8 black
      # Style checks are advisory: they report issues without failing the build,
      # so a pre-existing style nit in legacy code never blocks a green PR.
      - name: Ruff
        working-directory: backend
        run: ruff check . || true
      - name: Flake8
        working-directory: backend
        run: flake8 . --max-line-length=120 --extend-ignore=E203,W503 || true
      - name: Black (check)
        working-directory: backend
        run: black --check . || true

  lint-frontend:
    name: Lint (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: ESLint
        working-directory: frontend
        run: npm run lint
      - name: TypeScript type-check
        working-directory: frontend
        run: npx tsc --noEmit

  # ===========================================================================
  # 2. TEST  (+ 4. MIGRATION VALIDATION)
  # ===========================================================================
  test-backend:
    name: Test + migrations (backend)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hostel
          POSTGRES_USER: hostel
          POSTGRES_PASSWORD: hostel
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U hostel" --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DEBUG: "True"
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      DATABASE_URL: postgres://hostel:hostel@localhost:5432/hostel
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      # --- 4. Migration validation -------------------------------------------
      - name: Check for missing migrations
        working-directory: backend
        run: python manage.py makemigrations --check --dry-run
      - name: Validate migration plan
        working-directory: backend
        run: python manage.py migrate --plan
      # --- 3. Tests + coverage gate ------------------------------------------
      # pytest.ini pins DJANGO_SETTINGS_MODULE=config.settings_test (isolated
      # in-memory DB) and fails the build below 80% coverage of the canonical
      # Track A apps (see .coveragerc). A regression in auth/RBAC/admissions/
      # billing/checkout therefore blocks the merge.
      - name: Run tests with coverage gate (>=80%)
        working-directory: backend
        run: pytest --cov-report=xml --cov-report=term-missing
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/coverage.xml
            backend/htmlcov

  test-frontend:
    name: Test (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Run tests
        working-directory: frontend
        # Run a "test" script if one exists; otherwise this is a no-op so the
        # job stays green until a test runner is added.
        run: npm run test --if-present

  # ===========================================================================
  # 3. BUILD  (Docker images for both services)
  # ===========================================================================
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: hostel-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: hostel-frontend:ci
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # 5. SECURITY VALIDATION  (blocking on critical issues)
  # ===========================================================================
  security:
    name: Security validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # --- Secret scanning ---------------------------------------------------
      - name: Scan for committed secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # --- Python dependency vulnerabilities ---------------------------------
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Audit Python dependencies (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt
      # --- Node dependency vulnerabilities -----------------------------------
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Audit npm dependencies
        working-directory: frontend
        run: npm audit --audit-level=high
