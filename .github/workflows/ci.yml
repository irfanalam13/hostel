name: CI

# Fast feedback gate for every push and PR: lint, unit/integration tests +
# migration checks, and a Docker build of both services. A PR cannot merge green
# unless every blocking job passes — no manual review is needed to catch broken
# code. Heavier gates live in sibling workflows:
#   - production-validation.yml  full stack boot + deploy checks (Prompts 02/05)
#   - security.yml               SAST / deps / containers / SBOM   (Prompt 04)
#   - e2e.yml                    browser E2E + perf + DAST          (Phase 7)
on:
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"
      - "fix/**"
  pull_request:

# Cancel superseded runs on the same ref so a force-push doesn't pile up runners.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default. Jobs that need more (e.g. publishing a check run)
# opt in explicitly at the job level.
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"

jobs:
  # ===========================================================================
  # 1. LINT — blocking. No `|| true`: a lint failure blocks the merge.
  # ===========================================================================
  lint-backend:
    name: Lint (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-backend
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          # Lint needs only ruff, not the full app/test stack.
          install: "false"
      - name: Install ruff
        run: pip install ruff
      # Rule set + line length come from backend/pyproject.toml [tool.ruff].
      - name: Ruff (lint)
        working-directory: backend
        run: ruff check --output-format=github .
      - name: Ruff (format check)
        working-directory: backend
        # Advisory until the one-time repo-wide `ruff format` lands (~223 files);
        # surfaced here so the drift stays visible without blocking unrelated PRs.
        continue-on-error: true
        run: ruff format --check .

  lint-frontend:
    name: Lint (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-frontend
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: ESLint
        working-directory: frontend
        run: npm run lint
      - name: TypeScript type-check
        working-directory: frontend
        run: npm run typecheck

  # ===========================================================================
  # 2. TEST (backend) + migration validation. JUnit + coverage reports.
  # ===========================================================================
  test-backend:
    name: Test + migrations (backend)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write        # dorny/test-reporter publishes a check run
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hostel
          POSTGRES_USER: hostel
          POSTGRES_PASSWORD: hostel
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U hostel" --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DEBUG: "True"
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      DATABASE_URL: postgres://hostel:hostel@localhost:5432/hostel
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-backend
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          install-dev: "true"
      # --- Migration validation (Prompt 04 of the roadmap) -------------------
      - name: Check for missing migrations
        working-directory: backend
        run: python manage.py makemigrations --check --dry-run
      - name: Validate migration plan
        working-directory: backend
        run: python manage.py migrate --plan
      # --- Tests + coverage gate (>=80%, enforced by pytest.ini) -------------
      # pytest.ini pins config.settings_test and --cov-fail-under=80 over the
      # canonical Track A apps (.coveragerc), so an auth/RBAC/billing regression
      # blocks the merge. JUnit + Cobertura XML are emitted for reporting.
      - name: Run tests (coverage gate + JUnit)
        working-directory: backend
        run: >-
          pytest
          --junitxml=test-results/junit.xml
          --cov-report=xml
          --cov-report=term-missing
      - name: Publish test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Backend tests
          path: backend/test-results/junit.xml
          reporter: java-junit
          fail-on-error: false
      - name: Coverage summary
        if: always()
        run: python .github/scripts/coverage_summary.py backend/coverage.xml "Backend coverage"
      - name: Upload test + coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results
          path: |
            backend/test-results/junit.xml
            backend/coverage.xml
            backend/htmlcov
          retention-days: 14

  # ===========================================================================
  # 3. TEST (frontend) — vitest with JUnit output.
  # ===========================================================================
  test-frontend:
    name: Test (frontend)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-frontend
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run tests (vitest + coverage gate + JUnit)
        working-directory: frontend
        # --coverage enforces the regression-floor thresholds in vitest.config.ts.
        # vitest exits 0 when there are no test files, so this stays green until
        # suites are added while still failing on a real test/coverage regression.
        run: npm run test -- --coverage --reporter=default --reporter=junit --outputFile=test-results/junit.xml
      - name: Publish test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Frontend tests
          path: frontend/test-results/junit.xml
          reporter: java-junit
          fail-on-error: false
      - name: Upload test + coverage results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-test-results
          path: |
            frontend/test-results/junit.xml
            frontend/coverage
          retention-days: 14

  # ===========================================================================
  # 3b. TEST (ML service) + AI eval gate — deterministic prompt-contract checks
  #     (ML_hostel/tests). Fast, no LLM/network; blocks a prompt-safety regression.
  # ===========================================================================
  test-ml:
    name: Test + AI eval gate (ML service)
    runs-on: ubuntu-latest
    env:
      ML_SHARED_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ML deps + pytest
        working-directory: ML_hostel
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      - name: Run ML tests + AI eval gate
        working-directory: ML_hostel
        # `python -m pytest` puts the service root on sys.path (so `import app`
        # resolves); pytest.ini also sets pythonpath for bare invocations.
        run: python -m pytest -q

  # ===========================================================================
  # 4. BUILD — Docker images for both services. Matrix = parallel, fail-fast off
  # so a backend failure still reports the frontend result.
  # ===========================================================================
  build:
    name: Build ${{ matrix.service }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # max-mb = image-size budget (§1). Generous ceilings that catch silent
          # bloat (a stray dependency, a leaked build artifact) without flapping;
          # ratchet down toward the observed size once CI reports steady numbers.
          - service: backend
            context: ./backend
            build-args: ""
            max-mb: 1200
          - service: client
            context: ./frontend
            dockerfile: ./frontend/apps/client/Dockerfile
            build-args: |
              NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api
            max-mb: 600
          - service: admin
            context: ./frontend
            dockerfile: ./frontend/apps/admin/Dockerfile
            build-args: |
              NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api
            max-mb: 600
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          # Empty for backend (defaults to <context>/Dockerfile); the two
          # frontend zone images share the workspace context but have their own
          # Dockerfiles under apps/.
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: hostel-${{ matrix.service }}:ci
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
      - name: Build summary + size budget
        env:
          BUDGET: ${{ matrix.max-mb }}
        run: |
          BYTES=$(docker image inspect hostel-${{ matrix.service }}:ci --format '{{.Size}}')
          MB=$(awk "BEGIN{printf \"%.1f\", ${BYTES}/1048576}")
          {
            echo "### 🐳 ${{ matrix.service }} image built";
            echo "";
            echo "| Image | Size | Budget |";
            echo "| --- | --- | --- |";
            echo "| \`hostel-${{ matrix.service }}:ci\` | ${MB} MB | ${BUDGET} MB |";
          } >> "$GITHUB_STEP_SUMMARY"
          # Fail the build if the image blew past its budget (silent-bloat guard).
          if awk "BEGIN{exit !(${MB} > ${BUDGET})}"; then
            echo "::error::hostel-${{ matrix.service }} image is ${MB} MB, over the ${BUDGET} MB budget"
            exit 1
          fi
          echo "✓ hostel-${{ matrix.service }} ${MB} MB within ${BUDGET} MB budget"
