name: Commit lint

# Roadmap Prompt 09 — enforce Conventional Commits on PRs. Validates every
# commit in the PR and the PR title (the squash-merge commit subject).
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Lint PR commits
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yml
      - name: Lint PR title (squash-merge subject)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "$PR_TITLE" | npx --yes commitlint --config .commitlintrc.yml
