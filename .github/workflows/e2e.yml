name: E2E & QA

# Phase 7 quality gate: browser E2E (Playwright + Cypress), Lighthouse budgets,
# load smoke, and a ZAP baseline DAST scan. Runs alongside the unit/integration
# CI in ci.yml. The hermetic browser jobs (mocked API) block; the jobs that need
# a live perf/target environment (load, DAST) are advisory.
on:
  push:
    branches: [main, master, develop]
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.13"
  # The hermetic browser suites mock this origin at the network layer.
  NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000/api"

jobs:
  # ===========================================================================
  # Playwright — primary E2E (auth, service worker, offline, push, sync,
  # regression, smoke). Hermetic: the Django API is mocked, so no DB needed.
  # ===========================================================================
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright (chromium)
        # Visual regression (@visual) is excluded: its baselines are platform
        # specific and generated locally — see TESTING.md.
        run: npm run e2e -- --project=chromium --grep-invert @visual
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 14

  # ===========================================================================
  # Cypress — complementary user-journey + component tests (hermetic).
  # ===========================================================================
  cypress:
    name: Cypress E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Run Cypress E2E (starts server)
        run: npm run cy:ci
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-artifacts
          path: |
            frontend/cypress/screenshots
            frontend/cypress/videos
          retention-days: 7

  # ===========================================================================
  # Lighthouse CI — perf / a11y / best-practices / SEO / PWA budgets.
  # ===========================================================================
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Run Lighthouse CI
        run: npm run lhci
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: lighthouse-report
          path: frontend/.lighthouseci
          retention-days: 14

  # ===========================================================================
  # Load smoke (k6) — advisory. Boots a real backend and runs the smoke profile
  # so the load scripts themselves stay green; heavier profiles run on demand.
  # ===========================================================================
  load-smoke:
    name: Load smoke (k6)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hostel
          POSTGRES_USER: hostel
          POSTGRES_PASSWORD: hostel
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U hostel" --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DEBUG: "True"
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      DATABASE_URL: postgres://hostel:hostel@localhost:5432/hostel
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Migrate
        working-directory: backend
        run: python manage.py migrate --noinput
      - name: Seed a load-test tenant + user
        working-directory: backend
        run: |
          CODE=$(python manage.py shell -c "
          from apps.tenants.models import Hostel
          from apps.accounts.models import User, UserHostel
          h = Hostel.objects.create(name='LoadTest')
          u, _ = User.objects.get_or_create(username='warden', defaults={'role':'WARDEN'})
          u.role='WARDEN'; u.set_password('TestPass!234'); u.save()
          UserHostel.objects.get_or_create(user=u, hostel=h, defaults={'is_active':True})
          print(h.code)
          " | tail -n1)
          echo "HOSTEL_ID=$CODE" >> "$GITHUB_ENV"
      - name: Start backend
        working-directory: backend
        run: |
          python manage.py runserver 0.0.0.0:8000 &
          for i in $(seq 1 30); do curl -sf http://localhost:8000/api/auth/csrf/ && break || sleep 1; done
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6
      - name: Run k6 smoke
        env:
          SCENARIO: smoke
          BASE_URL: http://localhost:8000
          USERNAME: warden
          PASSWORD: "TestPass!234"
        run: |
          k6 run tests/load/auth-login.js
          k6 run tests/load/dashboard-read.js

  # ===========================================================================
  # DAST — OWASP ZAP baseline (advisory). Passive scan of the running SPA.
  # ===========================================================================
  security-dast:
    name: Security DAST (ZAP baseline)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Start frontend
        run: |
          npm run start:test &
          for i in $(seq 1 30); do curl -sf http://localhost:3100/login && break || sleep 1; done
      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: http://localhost:3100
          rules_file_name: tests/security/zap-baseline.conf
          cmd_options: "-a -I"
          allow_issue_writing: false
