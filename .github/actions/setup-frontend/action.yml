# =============================================================================
# Composite action — set up the Next.js frontend toolchain.
# Centralises Node setup + npm caching + `npm ci` so every frontend job shares
# one definition. Caller must `actions/checkout` first.
# =============================================================================
name: Setup frontend
description: Install Node, restore the npm cache, and run `npm ci`.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: "22"
  install:
    description: Run `npm ci`. Set "false" for jobs that only need the runtime.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Set up Node ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies (npm ci)
      if: inputs.install == 'true'
      shell: bash
      working-directory: frontend
      run: npm ci
