# Dependabot — automated dependency updates (Phase 0, §10 dependency automation).
#
# Covers every dependency surface in the monorepo: Python (backend + ML service),
# npm (frontend workspace), Docker base images (every Dockerfile), and the
# GitHub Actions themselves. Updates are GROUPED so a week's bumps land as a few
# reviewable PRs instead of dozens, and capped with open-PR limits so the queue
# never floods. Bumping `github-actions` also progressively pins actions to
# commit SHAs (supply-chain hardening, DEVOPS_AUDIT.md P3).
#
# All PRs are labelled and titled with Conventional-Commit prefixes so they pass
# the commit-lint gate (.github/workflows/commit-lint.yml) unchanged.
version: 2

updates:
  # --- Python: Django backend -------------------------------------------------
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    labels: ["dependencies", "backend"]
    groups:
      backend-minor-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]

  # --- Python: ML_hostel FastAPI service (AI layer) --------------------------
  - package-ecosystem: pip
    directory: /ML_hostel
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels: ["dependencies", "ml"]
    groups:
      ml-minor-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]

  # --- npm: frontend workspace (client + admin + packages) --------------------
  # One entry covers the whole workspace via the root package-lock.json.
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    labels: ["dependencies", "frontend"]
    groups:
      frontend-minor-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]
      # React/Next majors move together and need manual review — keep separate.

  # --- Docker base images -----------------------------------------------------
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: docker
    directory: /ML_hostel
    schedule:
      interval: weekly
      day: monday
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: docker
    directory: /frontend/apps/client
    schedule:
      interval: weekly
      day: monday
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: docker
    directory: /frontend/apps/admin
    schedule:
      interval: weekly
      day: monday
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "chore(deps)"

  # --- GitHub Actions (also SHA-pins actions over time) -----------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions-all:
        applies-to: version-updates
        patterns: ["*"]
