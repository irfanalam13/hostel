[pytest]
DJANGO_SETTINGS_MODULE = config.settings_test
# `apps/` is a namespace package (no __init__.py); importlib mode + namespace
# support makes pytest import test modules under their real dotted path
# (apps.billing.tests), so model classes match Django's app registry.
pythonpath = .
consider_namespace_packages = true
python_files = tests.py test_*.py *_tests.py
# Coverage is scoped to the CANONICAL Track A apps (see .coveragerc). Track B
# (admissions/students/rooms/fees/payments) is legacy and intentionally excluded
# from the coverage gate.
addopts =
    --import-mode=importlib
    --strict-markers
    --cov
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80
markers =
    concurrency: tests that exercise locking / race-condition handling
    integration: full multi-step API flows
filterwarnings =
    ignore:No directory at:UserWarning
