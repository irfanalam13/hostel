<h2>{{ hostel.name }} - Monthly Due Report ({{ month }})</h2>
<table border="1" cellpadding="6">
  <tr>
    <th>Student</th><th>Phone</th><th>Net Due</th><th>Status</th>
  </tr>
  {% for r in rows %}
  <tr>
    <td>{{ r.student.full_name }}</td>
    <td>{{ r.student.phone }}</td>
    <td>{{ r.net_due }}</td>
    <td>{{ r.status }}</td>
  </tr>
  {% endfor %}
</table>
