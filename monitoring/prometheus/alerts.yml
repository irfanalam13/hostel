# =============================================================================
# Alerting rules. Routed to Alertmanager (see alertmanager/alertmanager.yml).
# Thresholds are conservative starting points — tune to the production baseline.
# =============================================================================
groups:
  - name: availability
    rules:
      - alert: TargetDown
        expr: up == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Scrape target down: {{ $labels.job }} ({{ $labels.instance }})"
          description: "Prometheus has failed to scrape {{ $labels.instance }} for >2m."

      - alert: HealthEndpointFailing
        expr: probe_success == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Health probe failing: {{ $labels.instance }}"
          description: "Black-box probe of {{ $labels.instance }} has been failing for >2m."

      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "PostgreSQL is down"

      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "Redis is down"

  - name: application
    rules:
      # >5% of responses are 5xx over 5 minutes.
      - alert: HighServerErrorRate
        expr: |
          sum(rate(django_http_responses_total_by_status_total{status=~"5.."}[5m]))
            / sum(rate(django_http_responses_total_by_status_total[5m])) > 0.05
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Elevated 5xx error rate (>5%)"
          description: "{{ $value | humanizePercentage }} of responses are 5xx over the last 5m."

      # p95 request latency above 1s for 10 minutes.
      - alert: HighRequestLatency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(django_http_requests_latency_seconds_by_view_method_bucket[5m])) by (le)
          ) > 1
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "p95 request latency >1s"
          description: "95th-percentile latency has exceeded 1s for 10m."

  - name: resources
    rules:
      - alert: HighCpuUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "High CPU usage (>85%) on {{ $labels.instance }}"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "High memory usage (>90%) on {{ $labels.instance }}"

      - alert: LowDiskSpace
        expr: |
          (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}
            / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100 < 15
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "Low disk space (<15%) on {{ $labels.instance }} ({{ $labels.mountpoint }})"
