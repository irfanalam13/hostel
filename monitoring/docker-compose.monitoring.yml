# =============================================================================
# Observability stack — Prometheus, Alertmanager, Grafana, and exporters.
# Runs alongside the application stack and joins its network so it can scrape
# the `web`, `postgres`, and `redis` services by name.
#
#   # bring the app up first (creates the `hostel_default` network), then:
#   docker compose -f monitoring/docker-compose.monitoring.yml up -d
#
# Requires PROMETHEUS_ENABLED=True in the app's .env so /metrics is exposed.
# Set the app network name via MONITORING_APP_NETWORK if your compose project
# name differs from "hostel" (default network is "<project>_default").
# =============================================================================
services:
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks: [monitoring, app]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "127.0.0.1:9093:9093"
    networks: [monitoring]

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on: [prometheus]
    networks: [monitoring]

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    pid: host
    networks: [monitoring]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks: [monitoring]

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    environment:
      # Reuses the app's DB credentials. sslmode=disable for the internal network.
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-hostel}:${POSTGRES_PASSWORD:-hostel}@postgres:5432/${POSTGRES_DB:-hostel}?sslmode=disable"
    networks: [monitoring, app]

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
    networks: [monitoring, app]

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    restart: unless-stopped
    command:
      - --config.file=/etc/blackbox/blackbox.yml
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    networks: [monitoring, app]

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
  # The application's compose network (external). Override the name with
  # MONITORING_APP_NETWORK if your project name isn't the default "hostel".
  app:
    external: true
    name: ${MONITORING_APP_NETWORK:-hostel_default}
