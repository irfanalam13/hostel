# Black-box exporter modules. http_2xx treats any 2xx as success and follows
# redirects — used by the blackbox-http scrape job to probe health endpoints.
modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      valid_status_codes: [200]
      method: GET
      follow_redirects: true
      preferred_ip_protocol: ip4
