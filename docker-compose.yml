# =============================================================================
# Hostel SaaS — full production-style stack
#
#   docker compose up -d          start everything in the background
#   docker compose down           stop and remove containers
#   docker compose logs -f web    follow backend logs
#
# All configuration comes from the root `.env` file (copy `.env.example`).
# =============================================================================

# DATABASE_URL is assembled from the POSTGRES_* vars so the app credentials and
# the database credentials can never drift apart. This `environment:` value
# overrides any DATABASE_URL that might leak in via env_file.
#
# The base stack runs PostgreSQL as a container (the `postgres` service below),
# so `docker compose -f docker-compose.yml up` is a self-contained, production-
# shaped stack. Local dev instead talks to a PostgreSQL server on the host; that
# swap lives in docker-compose.override.yml and does not touch this base file.
x-postgres-dsn: &postgres-dsn
  DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-irfanalam}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-hostel}

services:
  # ---------------------------------------------------------------------------
  # postgres — primary datastore
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hostel}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-irfanalam}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hostel}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis — Celery broker / result backend / cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # web — Django + Gunicorn (applies migrations on start)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *postgres-dsn
      RUN_MIGRATIONS: "1"
    volumes:
      - media_data:/app/media
    ports:
      - "${WEB_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
        # Dev profiles the container Postgres out (host Postgres is used instead),
        # so this dependency must be optional or the dev project won't validate.
        required: false
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # celery_worker — background task execution
  # ---------------------------------------------------------------------------
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    # Only `web` migrates; sidecars skip it to avoid racing on the same schema.
    environment:
      <<: *postgres-dsn
      RUN_MIGRATIONS: "0"
    command: ["celery", "-A", "config", "worker", "--loglevel=info"]
    volumes:
      - media_data:/app/media
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_started
    healthcheck:
      # `inspect ping` exits 0 when at least one worker replies, non-zero otherwise.
      test: ["CMD", "celery", "-A", "config", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # celery_beat — periodic task scheduler
  # ---------------------------------------------------------------------------
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env

    # Only `web` migrates; sidecars skip it to avoid racing on the same schema.
    environment:
      <<: *postgres-dsn
      RUN_MIGRATIONS: "0"

    # Schedule + pid files go to a writable path.
    command:
      [
        "celery",
        "-A",
        "config",
        "beat",
        "--loglevel=info",
        "--schedule",
        "/tmp/celerybeat-schedule",
        "--pidfile=/tmp/celerybeat.pid",
      ]

    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_started

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os; os.kill(int(open('/tmp/celerybeat.pid').read()), 0)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # frontend — CLIENT zone (marketing site, Next.js standalone server).
  # Owns the public origin; fallback-rewrites all non-marketing paths to the
  # admin zone below, so browsing http://localhost:3000 serves the whole app.
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: apps/client/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
        NEXT_PUBLIC_TENANT_BASE_DOMAIN: ${NEXT_PUBLIC_TENANT_BASE_DOMAIN:-localhost}
        # Baked into the standalone routes manifest at build time (see Dockerfile).
        ADMIN_ZONE_URL: http://admin:3000
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Read at runtime by src/proxy.ts to build the CSP connect-src.
      # Must match the build arg above; without it the middleware falls back to
      # localhost and the deployed CSP would block the real API origin.
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
      # Read at runtime by the shared edge proxy for workspace-subdomain routing.
      NEXT_PUBLIC_TENANT_BASE_DOMAIN: ${NEXT_PUBLIC_TENANT_BASE_DOMAIN:-localhost}
      # Server-side (SSR) API fetches must use the service-internal URL — the
      # browser-facing localhost URL points at the wrong container from here.
      API_INTERNAL_URL: http://web:8000/api
      # Where the client zone proxies non-marketing paths (service-internal).
      ADMIN_ZONE_URL: http://admin:3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      admin:
        condition: service_started
      web:
        condition: service_started

  # ---------------------------------------------------------------------------
  # admin — ADMIN zone (authenticated workspace + PWA, Next.js standalone).
  # Reached through the client zone in normal use; the host port is exposed for
  # direct access/debugging.
  # ---------------------------------------------------------------------------
  admin:
    build:
      context: ./frontend
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
        NEXT_PUBLIC_TENANT_BASE_DOMAIN: ${NEXT_PUBLIC_TENANT_BASE_DOMAIN:-localhost}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
      NEXT_PUBLIC_TENANT_BASE_DOMAIN: ${NEXT_PUBLIC_TENANT_BASE_DOMAIN:-localhost}
    ports:
      - "${ADMIN_PORT:-3001}:3000"
    depends_on:
      web:
        condition: service_started

  # ---------------------------------------------------------------------------
  # ollama — local LLM runtime (default AI provider). The image ships no models;
  # pull one once (persisted in the ollama_data volume):
  #   docker compose exec ollama ollama pull llama3.2:3b
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # ml_hostel — AI service (FastAPI + Uvicorn). Verifies the context token Django
  # mints, runs the agent/LLM loop, and reaches business data ONLY back through
  # the web gateway (apps.assistant) with that token — so tenancy + RBAC are
  # enforced by Django, never re-implemented here.
  # ---------------------------------------------------------------------------
  ml_hostel:
    build:
      context: ./ML_hostel
      dockerfile: Dockerfile
    restart: unless-stopped
    # ML_SHARED_SECRET (must match Django's) + optional provider keys come from .env
    env_file: .env
    environment:
      ML_DJANGO_API_URL: ${ML_DJANGO_API_URL:-http://web:8000/api}
      ML_OLLAMA_URL: ${ML_OLLAMA_URL:-http://ollama:11434}
      ML_PROVIDER: ${ML_PROVIDER:-ollama}
      ML_MODEL: ${ML_MODEL:-llama3.2:3b}
    ports:
      - "${ML_PORT:-9000}:9000"
    depends_on:
      web:
        condition: service_started
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  media_data:
  ollama_data:
