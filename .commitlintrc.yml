# Conventional Commits ruleset (used by .github/workflows/commit-lint.yml).
extends:
  - "@commitlint/config-conventional"
rules:
  # type-enum: the allowed commit/PR types.
  type-enum:
    - 2
    - always
    - [build, chore, ci, docs, feat, fix, perf, refactor, revert, style, test]
  subject-empty: [2, never]
  type-empty: [2, never]
  header-max-length: [2, always, 100]
