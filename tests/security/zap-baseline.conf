# OWASP ZAP baseline scan rule configuration.
#
# Format:  <ruleId>	<action>	<comment>
#   actions: WARN (report, non-blocking) | FAIL (block CI) | IGNORE (silence)
#
# The baseline scan is passive (it crawls + spiders, never attacks), so it's safe
# to run against a staging URL in CI. We FAIL the build on the high-signal issues
# that map to this app's threat model and IGNORE known false positives from the
# SPA + off-origin API split.

# --- Block on these (real risks for a multi-tenant SaaS) --------------------
40012	FAIL	(Cross Site Scripting - Reflected)
40014	FAIL	(Cross Site Scripting - Persistent)
40018	FAIL	(SQL Injection)
90020	FAIL	(Remote OS Command Injection)
40003	FAIL	(CRLF Injection)
10202	FAIL	(Absence of Anti-CSRF Tokens on auth forms)

# --- Report but don't block (review each PR) --------------------------------
10038	WARN	(CSP header — enforced in next.config.ts; ZAP can't always see it on API origin)
10063	WARN	(Permissions Policy header)
10035	WARN	(Strict-Transport-Security — only present over HTTPS)
10096	WARN	(Timestamp disclosure)

# --- Known false positives for this architecture ----------------------------
10049	IGNORE	(Non-cacheable content — APIs intentionally set no-store)
10027	IGNORE	(Information disclosure - suspicious comments in hashed JS bundles)
10109	IGNORE	(Modern web app — ZAP mislabels client-side routing)
